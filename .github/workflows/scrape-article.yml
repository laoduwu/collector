name: Scrape Article

on:
  repository_dispatch:
    types: [scrape-article]
  workflow_dispatch:
    inputs:
      article_id:
        description: 'Article ID (for manual testing)'
        required: true
        type: string
      source_url:
        description: 'Source URL'
        required: true
        type: string
      content_type:
        description: 'article | youtube | bilibili'
        required: true
        default: 'article'
        type: string
      callback_url:
        description: 'Supabase actions-callback URL'
        required: true
        type: string

concurrency:
  group: scrape-${{ github.event.client_payload.article_id || inputs.article_id }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scraper
        env:
          ARTICLE_ID:    ${{ github.event.client_payload.article_id || inputs.article_id }}
          SOURCE_URL:    ${{ github.event.client_payload.source_url || inputs.source_url }}
          CONTENT_TYPE:  ${{ github.event.client_payload.content_type || inputs.content_type }}
          CALLBACK_URL:  ${{ github.event.client_payload.callback_url || inputs.callback_url }}
          CALLBACK_TOKEN: ${{ secrets.ROCBASE_CALLBACK_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          LOG_LEVEL: INFO
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          cd src
          python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
          retention-days: 7
